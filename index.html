```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A & A | Find Your Place</title>

<link rel="stylesheet" href="style.css">


<!-- Wedding Typography -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

</head>


<body>


<main class="page">


<section class="place-card">


<!-- Monogram -->

<div class="monogram">
A <span>+</span> A
</div>


<div class="date">
19 SEPTEMBER 2026
</div>



<div class="ornament">
✦
</div>



<h1>
Welcome
</h1>


<p class="subtitle">
Your place awaits
</p>



<div class="search-section">


<label>
Please enter your name
</label>


<input 
type="text"
placeholder="Your name"
id="guestName"
>


<button>
Find My Place
</button>


</div>




<!-- Hidden until guest search -->

<div class="seat-result hidden">


<div class="guest-name">
Guest Name
</div>


<div class="divider"></div>


<p class="label">
TABLE
</p>


<div class="table-number">
08
</div>



<p class="label">
SEAT
</p>


<div class="seat-number">
03
</div>


<div class="divider"></div>


<p class="closing">
Enjoy the evening
</p>


</div>




<footer>

With love,<br>
A & A

</footer>



</section>


</main>


</body>

</html>
```
