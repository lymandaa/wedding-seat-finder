<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A & A | Find Your Place</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

</head>


<body>


<div class="stars"></div>
<div class="night-glow"></div>


<main class="page">


<section class="content">


<div class="monogram">
A <span>+</span> A
</div>


<div class="date">
25 SEPTEMBER 2027
</div>



<div class="ornament">
✦
</div>



<h1>
Welcome
</h1>


<p class="subtitle">
Your place awaits
</p>



<div class="search-area">


<label>
Please enter your name
</label>


<input 
type="text"
placeholder="Your name"
id="guestName"
>


<button>
Find My Place
</button>


</div>





<div class="result">


<div class="guest-name">
Amanda
</div>


<div class="line"></div>



<div class="label">
TABLE
</div>


<div class="number">
08
</div>



<div class="label">
SEAT
</div>


<div class="number seat">
03
</div>



<div class="line"></div>


<p class="closing">
Enjoy the celebration ✨
</p>



</div>





<footer>
With love,<br>
A & A
</footer>


</section>


</main>


</body>

</html>
