<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A & A | Find Your Table</title>

<link rel="stylesheet" href="style.css">


<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500&family=Parisienne&display=swap" rel="stylesheet">


</head>


<body>


<main class="page">


<section class="content">


<div class="monogram">
A <span>+</span> A
</div>


<div class="date">
25 SEPTEMBER 2027
</div>


<div class="divider"></div>


<h1>
Welcome
</h1>


<p class="subtitle">
Find your table for the celebration
</p>



<div class="search-area">


<label>
ENTER YOUR NAME
</label>


<input 
type="text"
placeholder="Your name"
id="guestName"
>


<button>
VIEW TABLE
</button>


</div>





<div class="result">


<div class="guest-name">
Amanda
</div>


<div class="divider"></div>


<div class="label">
YOUR TABLE
</div>


<div class="number">
08
</div>



<p class="closing">
Enjoy the evening
</p>


</div>





<footer>
A & A
</footer>


</section>


</main>


</body>

</html>
